
<div class="search d-flex align-items-center justify-content-start mx-0 px-0 h-100">
  <div id="{{ search_bar_id }}" class="d-flex align-items-center justify-content-center bg-transparent h-100">
    <div class="position-relative">
      <!-- Search input -->
      <input
        id="{{ search_bar_id }}-input"
        type="text"
        class="form-control rounded-pill search-bar pe-5 ps-3"
        placeholder="Search..."
        aria-label="Search"
      >

      <!-- Clear button (X) aligned just before the search icon -->
      <button
        id="{{ search_bar_id }}-clear"
        type="button"
        class="btn position-absolute top-50 end-4 translate-middle-y text-white px-2 ml-4"
        style="background: none; border: none; display: none;"
      >
        <i class="fa fa-times"></i>
      </button>

      <!-- Search button (magnifier) -->
      <button
        id="{{ search_bar_id }}-apply"
        type="button"
        class="btn position-absolute top-50 end-0 translate-middle-y text-white"
        style="background: none; border: none;"
      >
        <i class="fa fa-search"></i>
      </button>
    </div>
  </div>
</div>

<style>

</style>
{% block extra_script %}
<script>

document.addEventListener('DOMContentLoaded', function() {
  var searchBarId = '{{ search_bar_id }}';
  var searchInput = document.getElementById(searchBarId + '-input');
  var searchApply = document.getElementById(searchBarId + '-apply');
  var searchClear = document.getElementById(searchBarId + '-clear');

  if (!searchInput || !searchApply || !searchClear) return;

  function onSearch(q) {
    if (!q) return;
    var catalogPagePath = (window.__GEONODE_CONFIG__ && window.__GEONODE_CONFIG__.localConfig && window.__GEONODE_CONFIG__.localConfig.geoNodeSettings && window.__GEONODE_CONFIG__.localConfig.geoNodeSettings.catalogPagePath) || '';
    var searchPath = '/catalogue/#/search';
    var baseCatalogPath = catalogPagePath ? searchPath.replace('/catalogue/', catalogPagePath) : searchPath;
    {% block searchbar_search_href %}
    location.href = baseCatalogPath + '?q=' + encodeURIComponent(q);
    {% endblock %}
  }

  // Show/hide "X" only after typing and leaving focus
  searchInput.addEventListener('focus', function() {
    searchClear.style.display = 'none';
  });

  searchInput.addEventListener('blur', function() {
    if (this.value.trim() !== '') {
      searchClear.style.display = 'block';
    } else {
      searchClear.style.display = 'none';
    }
  });

  // Clear input when clicking "X"
  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    searchClear.style.display = 'none';
    searchInput.focus();
  });

  // Trigger search on Enter
  searchInput.addEventListener('keyup', function(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      onSearch(searchInput.value.trim());
    }
  });

  // Trigger search on button click
  searchApply.addEventListener('click', function() {
    onSearch(searchInput.value.trim());
  });
});
</script>
{% endblock extra_script %}
