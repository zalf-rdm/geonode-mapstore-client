name: Publish Python package to PyPI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Set up npm
        uses: actions/setup-node@v4
        with:
            node-version: 20

      - name: build js files
        run: |
          npm install
          npm run compile
        working-directory: ./geonode_mapstore_client/client

      - name: Add build metadata to version
        run: |
          BASE_VERSION=$(cat VERSION)
          BUILD_SUFFIX="+build${{ github.run_number }}"
          echo "${BASE_VERSION}${BUILD_SUFFIX}" > VERSION

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine upload -u __token__ -p $TWINE_PASSWORD dist/*
