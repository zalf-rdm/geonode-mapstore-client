# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build_and_commit:
    permissions:
      contents: write
    env:
      working-directory: ./geonode_mapstore_client/client
    runs-on: ubuntu-latest
    steps:
      - name: "Checking out"
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          # For PRs, check out the head branch so we can push back to it
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      ###########
      # SET UP
      #########
      - name: "Setting up npm"
        uses: actions/setup-node@v4
        with:
            node-version: 20

      ############
      # CACHING
      ##########
      - name: "Cache node modules"
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm # npm cache files are stored in `~/.npm` on Linux/macOS
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      ###############
      # NPM BUILD
      #############
      - name: "Run npm install"
        run: npm install
        working-directory: ${{env.working-directory}}

      - name: "Run npm compile"
        run: npm run compile
        working-directory: ${{env.working-directory}}

      ###############
      # COMMIT
      #############
      - name: "Commit and push dist"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f geonode_mapstore_client/static/mapstore/dist/
          git diff --staged --quiet || git commit -m "chore: rebuild frontend dist [skip ci]"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}

